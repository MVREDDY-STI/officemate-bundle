<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="OfficeMate smart room display">

  <!-- TV / fullscreen meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="OfficeMate">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>OfficeMate</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Prevent scrollbars on TV screens */
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background-color: #ffffff;
    }
  </style>
</head>
<body>
  <!-- 
    Force the HTML renderer for maximum TV device compatibility:
    This prevents the app from downloading CanvasKit (WebGL/WebAssembly)
    and instead relies on standard HTML/DOM which runs on any Chromium TV browser.
  -->
  <script>
    window.flutterWebRenderer = "html";
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
