server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow up to 100 MB uploads (no size limit on photos/images)
    client_max_body_size 100m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ── API reverse proxy ──────────────────────────────────
    # Forwards /api/* and /health → Bun backend
    # This means VITE_API_URL can be empty (relative URLs),
    # so the app works from any hostname — not just localhost.
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 100m;
    }

    # ── WebSocket proxy ────────────────────────────────────
    location /ws {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Swagger docs proxy ─────────────────────────────────
    location /docs {
        proxy_pass http://backend:3000;
    }

    location /health {
        proxy_pass http://backend:3000;
    }

    # ── MinIO uploads proxy ────────────────────────────────
    # Storage keys look like: uploads/<userId>/<timestamp>-<rand>.<ext>
    # Backend returns /uploads/... (root-relative), Nginx proxies to MinIO bucket.
    location /uploads/ {
        proxy_pass         http://minio:9000/officemate/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host minio:9000;
        proxy_read_timeout 30s;
        # Uploaded user assets — cache aggressively (keys are content-addressed by timestamp)
        add_header Cache-Control "public, max-age=31536000";
    }

    # ── React SPA ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Vite-fingerprinted assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy       "strict-origin-when-cross-origin";
}
